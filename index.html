<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicroGPT 可视化探索器</title>
  <link rel="stylesheet" href="./assets/index.css" />
</head>

<body>
  <div id="root"></div>

  <script type="module" src="./assets/index.js"></script>
  <script>
    (function () {
      const exactMap = new Map([
        ["MicroGPT", "MicroGPT"],
        ["Visual Explorer — @karpathy", "可视化探索器 — @karpathy"],
        ["📖 Read Official Guide", "📖 阅读官方指南"],
        ["Dark", "深色"],
        ["Light", "浅色"],
        ["Tokenizer", "分词器"],
        ["Embeddings (wte/wpe)", "嵌入（wte/wpe）"],
        ["Forward Pass", "前向传播"],
        ["Training", "训练"],
        ["Inference", "推理"],

        ["1. Tokenizer", "1. 分词器"],
        ["Character → ID Mapping", "字符 → ID 映射"],
        ["Try It: Type a Name", "试一试：输入一个名字"],
        ["What the model must learn:", "模型必须学会什么："],
        ["How tokenization works in real GPTs", "真实 GPT 的分词方式"],
        ["Type a name...", "输入一个名字..."],

        ["2. Embeddings (wte & wpe)", "2. 嵌入（wte 与 wpe）"],
        ["wte — Token Embeddings", "wte — Token 嵌入"],
        ["wpe — Position Embeddings", "wpe — 位置嵌入"],
        ["How wte + wpe combine", "wte + wpe 如何结合"],
        ["combined (input to the model)", "combined（模型输入）"],
        ["position embedding", "位置嵌入"],

        ["3. Forward Pass", "3. 前向传播"],
        ["Select Input", "选择输入"],
        ["Token:", "Token："],
        ["Position:", "位置："],
        ["Data flowing through the model", "数据在模型中的流动"],
        ["Intermediate Vectors (16 dims)", "中间向量（16 维）"],
        ["Output: Next Token Probabilities", "输出：下一个 Token 的概率"],
        ["Attention Weights (4 heads)", "注意力权重（4 个头）"],
        ["MLP Hidden Layer (64 neurons)", "MLP 隐藏层（64 个神经元）"],

        ["4. Training", "4. 训练"],
        ["Controls", "控制"],
        ["Train 200 Steps", "训练 200 步"],
        ["Train 500", "训练 500"],
        ["Train 1000", "训练 1000"],
        ["Stop", "停止"],
        ["Reset Model", "重置模型"],
        ["Loss Over Time", "损失随时间变化"],
        ["Last Training Step Detail", "最近一步训练详情"],
        ["What happens in each training step", "每一步训练发生了什么"],
        ["Step:", "步数："],
        ["Loss:", "损失："],
        ["LR:", "学习率："],
        ["Name:", "名字："],

        ["5. Inference", "5. 推理"],
        ["Generate", "生成"],
        ["Generate 1", "生成 1 个"],
        ["Generate 10", "生成 10 个"],
        ["Clear", "清空"],
        ["Temperature:", "温度："],
        ["How generation works", "生成是如何工作的"],

        [
          "Built with AI. May contain inaccuracies or bugs. Based on",
          "由 AI 构建。可能存在不准确或缺陷。基于"
        ],
        ["Karpathy's microgpt.py", "Karpathy 的 microgpt.py"],

        [
          "The model cannot read letters. It only understands numbers. The tokenizer converts each character to a numeric ID, and adds a special BOS (Begin/End of Sequence) token to mark the boundaries of each name.",
          "模型不能直接读取字母，它只理解数字。分词器会把每个字符转换为数值 ID，并添加一个特殊的 BOS（序列开始/结束）Token 来标记每个名字的边界。"
        ],
        [
          "Type any name below. Watch how it becomes a sequence of token IDs. The model will learn from sequences like this — predicting each next token from the previous ones.",
          "在下方输入任意名字，观察它如何变成一串 Token ID。模型将从这样的序列中学习——根据前面的 Token 预测下一个 Token。"
        ],
        [
          "For each position, the model sees the current token and must predict the next token. This is called next-token prediction — the core of how GPT works.",
          "在每个位置上，模型看到当前 Token，并必须预测下一个 Token。这称为“下一个 Token 预测”，也是 GPT 的核心机制。"
        ],
        [
          "This micro GPT uses character-level tokenization — each letter is one token.",
          "这个 micro GPT 使用字符级分词——每个字母就是一个 Token。"
        ],
        [
          "Real GPTs (like GPT-4) use subword tokenization",
          "真实 GPT（如 GPT-4）使用子词分词"
        ],
        [
          "Our tiny vocab of",
          "我们这个小词表共"
        ],

        [
          "Watch one token flow through the entire model. Each step transforms the 16-number vector until it becomes 27 probability scores — one for each possible next character.",
          "观察一个 Token 如何流经整个模型。每一步都会变换这个 16 维向量，直到得到 27 个概率分数——对应每个可能的下一个字符。"
        ],
        [
          "Each box shows the data at that stage. The 16 numbers get transformed at each step. Colors show values:",
          "每个方框展示该阶段的数据。16 个数会在每一步被变换。颜色表示数值："
        ],

        [
          "Each step: pick a name, feed its characters one by one, measure how wrong the predictions are (loss), then adjust all parameters to reduce the error. Watch the loss drop from ~3.3 (random guessing) as the model learns character patterns.",
          "每一步训练：选取一个名字，逐个输入字符，衡量预测错误程度（loss），再调整所有参数以降低误差。随着模型学到字符模式，损失会从约 3.3（随机猜测）逐步下降。"
        ],
        [
          "The model outputs these probabilities for the next character. The",
          "模型给出下一个字符的这些概率。"
        ],
        [
          "After training, the model generates new names it has never seen. Starting from BOS, it predicts the next character, samples one, feeds it back in, and repeats until BOS appears again.",
          "训练后，模型会生成从未见过的新名字。从 BOS 开始，它预测下一个字符、采样一个结果并回馈为下一步输入，重复直到再次出现 BOS。"
        ],
        [
          "The model hasn't been trained yet! Go to the Training tab first and train for at least 200 steps. You can still generate, but results will be random gibberish.",
          "模型尚未训练！请先进入“训练”页并至少训练 200 步。你仍可生成，但结果大概率是随机乱码。"
        ],
        [
          "Temperature controls randomness. Low (0.1) = always picks the most likely character (boring but safe). High (2.0) = more random picks (creative but chaotic). Try different values!",
          "Temperature 控制随机性。低温（0.1）= 总是选最可能字符（稳定但单调）；高温（2.0）= 更随机（更有创意但更混乱）。可以多试几个值！"
        ],
        [
          "How generation works",
          "生成过程原理"
        ],
        [
          "This is called autoregressive generation — the model generates one token at a time, each depending on all previous tokens. This is exactly how ChatGPT works, just at a much larger scale.",
          "这叫“自回归生成”——模型一次生成一个 Token，每一步都依赖先前所有 Token。ChatGPT 的工作方式本质相同，只是规模大得多。"
        ]
      ]);

      const regexRules = [
        [
          /^Every unique character in the dataset gets a numeric ID\./,
          "数据集中的每个唯一字符都会分配一个数值 ID。"
        ],
        [
          /^This makes the vocabulary much larger.*efficiently\.$/,
          "这会让词表规模大很多（约 5 万到 10 万 Token），但能让模型更高效地处理文本。"
        ],
        [
          /^The model represents each token and each position as a list of 16 numbers.*training\.$/,
          "模型把每个 Token 和每个位置都表示为 16 个数（一个“向量”）。这些数是模型可学习参数——起初随机，训练中逐步调整。"
        ],
        [
          /^The model's prediction for what character comes after.*$/,
          "这是模型对“下一个字符”的预测概率。条形越高，表示越可能。"
        ],
        [/^Generated Names \((\d+)\)$/, "生成的名字（$1）"],
        [/^Generation Trace: "(.*)"$/, "生成轨迹：“$1”"],
        [/^Probabilities at position (\d+)$/, "位置 $1 的概率"],
        [/^Click "Generate" to create names\.\.\.$/, "点击“生成”来创建名字..."],
        [/^pos (\d+)$/, "位置 $1"],
        [/^Top: '(.*)' (\d+)%$/, "最高：'$1' $2%"]
      ];

      const attrMap = new Map([
        ["Type a name...", "输入一个名字..."],
        ["Toggle menu", "切换菜单"]
      ]);

      function translateString(text) {
        if (!text) return text;
        const normalized = text.trim();
        if (!normalized) return text;
        if (exactMap.has(normalized)) {
          return text.replace(normalized, exactMap.get(normalized));
        }
        for (const [pattern, replacement] of regexRules) {
          if (pattern.test(normalized)) {
            return text.replace(normalized, normalized.replace(pattern, replacement));
          }
        }
        return text;
      }

      function walkAndTranslate(root) {
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
        let node;
        while ((node = walker.nextNode())) {
          const parent = node.parentElement;
          if (!parent) continue;
          if (parent.tagName === "SCRIPT" || parent.tagName === "STYLE") continue;
          const before = node.nodeValue;
          const after = translateString(before);
          if (after !== before) node.nodeValue = after;
        }

        const elements = root.querySelectorAll("input,button,select,option,a,[title],[aria-label]");
        elements.forEach((el) => {
          if (el.placeholder && attrMap.has(el.placeholder)) {
            el.placeholder = attrMap.get(el.placeholder);
          }
          const aria = el.getAttribute("aria-label");
          if (aria && attrMap.has(aria)) {
            el.setAttribute("aria-label", attrMap.get(aria));
          }
          const title = el.getAttribute("title");
          if (title) {
            const t2 = translateString(title);
            if (t2 !== title) el.setAttribute("title", t2);
          }
        });
      }

      function applyTranslations() {
        walkAndTranslate(document.body);
      }

      const observer = new MutationObserver(() => {
        applyTranslations();
      });

      const start = () => {
        applyTranslations();
        observer.observe(document.body, { childList: true, subtree: true, characterData: true });
        let tries = 0;
        const timer = setInterval(() => {
          applyTranslations();
          tries += 1;
          if (tries > 30) clearInterval(timer);
        }, 300);
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", start);
      } else {
        start();
      }
    })();
  </script>
</body>

</html>
