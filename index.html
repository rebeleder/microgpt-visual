      const regexRules = [

        [/^Generation Trace: "(.*)"$/, "生成轨迹：“$1”"],
        [/^Probabilities at position (\d+)$/, "位置 $1 的概率"],
        [/^Click "Generate" to create names\.\.\.$/, "点击“生成”来创建名字..."],
        [/^pos (\d+)$/, "位置 $1"],
        [/^Top: '(.*)' (\d+)%$/, "最高：'$1' $2%"],

      const fragmentRules = [
        ["This micro GPT uses", "这个 micro GPT 使用"],

        [", then", "，然后"],

      const keywordRules = [
        [/\bstands for\b/gi, "表示"],
        [/\brows\b/gi, "行"],
        [/\bcolumns\b/gi, "列"],
        [/\bwhere\b/gi, "位置"],
        [/Hover\s+over\s+a\s+row\s+to\s+highlight\s+it\.?/gi, "将鼠标悬停在某一行可高亮显示。"],
        [/\bHover\s+over\s+a\s+row\b/gi, "将鼠标悬停在某一行"],
        [/\bto\s+highlight\s+it\.?\b/gi, "以高亮显示。"]
      ];

      const attrMap = new Map([
        ["Type a name...", "输入一个名字..."],
        ["Toggle menu", "切换菜单"]
      ]);

      function translateString(text) {
        if (!text) return text;
        let output = text;
        const normalized = text.trim();
        if (!normalized) return text;
        if (exactMap.has(normalized)) {
          return output.replace(normalized, exactMap.get(normalized));
        }
        for (const [pattern, replacement] of regexRules) {
          if (pattern.test(normalized)) {
            return output.replace(normalized, normalized.replace(pattern, replacement));
          }
        }
        for (const [en, zh] of fragmentRules) {
          if (output.includes(en)) {
            output = output.split(en).join(zh);
          }
        }
        for (const [pattern, replacement] of keywordRules) {
          output = output.replace(pattern, replacement);
        }
        return output;
      }

      function patchCanvasText() {
        const proto = CanvasRenderingContext2D && CanvasRenderingContext2D.prototype;
        if (!proto || proto.__microgptPatched) return;
        const original = proto.fillText;
        proto.fillText = function (text, ...args) {
          const translated = typeof text === "string" ? translateString(text) : text;
          return original.call(this, translated, ...args);
        };
        proto.__microgptPatched = true;
      }

      function walkAndTranslate(root) {
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
        let node;
        while ((node = walker.nextNode())) {
          const parent = node.parentElement;
          if (!parent) continue;
          if (parent.tagName === "SCRIPT" || parent.tagName === "STYLE") continue;
          const before = node.nodeValue;
          const after = translateString(before);
          if (after !== before) node.nodeValue = after;
        }

        const elements = root.querySelectorAll("input,button,select,option,a,[title],[aria-label]");
        elements.forEach((el) => {
          if (el.placeholder && attrMap.has(el.placeholder)) {
            el.placeholder = attrMap.get(el.placeholder);
          }
          const aria = el.getAttribute("aria-label");
          if (aria && attrMap.has(aria)) {
            el.setAttribute("aria-label", attrMap.get(aria));
          }
          const title = el.getAttribute("title");
          if (title) {
            const t2 = translateString(title);
            if (t2 !== title) el.setAttribute("title", t2);
          }
        });
      }

      function applyTranslations() {
        walkAndTranslate(document.body);
      }

      const observer = new MutationObserver(() => {
        applyTranslations();
      });

      const start = () => {
        patchCanvasText();
        applyTranslations();
        observer.observe(document.body, { childList: true, subtree: true, characterData: true });
        let tries = 0;
        const timer = setInterval(() => {
          applyTranslations();
          tries += 1;
          if (tries > 30) clearInterval(timer);
        }, 300);
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", start);
      } else {
        start();
      }
    })();
